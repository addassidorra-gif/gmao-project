services:
  - type: web
    name: gmao-project
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "gmao-project.onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://gmao-project.onrender.com"
      - key: SECRET_KEY
        generateValue: true
